name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build binaries for multiple platforms
  build-release:
    name: Build release binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sketch
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sketch
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sketch
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sketch

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross (for aarch64 on ubuntu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Create artifact directory
        run: mkdir -p artifacts

      - name: Copy binary to artifacts
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }}.exe artifacts/
          else
            cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/
          fi
        shell: bash

      - name: Create checksum
        run: |
          cd artifacts
          sha256sum ${{ matrix.artifact_name }}* > SHA256SUMS
          cat SHA256SUMS
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.os }}-${{ matrix.target }}
          path: artifacts/

  # Create GitHub release with binaries
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-artifacts

      - name: Prepare release notes
        id: release-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Extract changelog for this version
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 > release-notes.txt || echo "See CHANGELOG.md for details" > release-notes.txt

          echo "## $VERSION" >> release-notes.txt
          echo "" >> release-notes.txt
          echo "### Binaries" >> release-notes.txt
          find release-artifacts -type f ! -name "SHA256SUMS" | sort | while read f; do
            echo "- $(basename $f)" >> release-notes.txt
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.txt
          files: |
            release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish to crates.io
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
