name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Test as non-root user (default)
  test-non-root:
    name: Tests (non-root user)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests (non-root compatible)
        run: cargo test
        env:
          CARGO_TERM_VERBOSE: false

      - name: Check for clippy warnings
        run: cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: true

  # Test as root user (overlay isolation tests)
  test-root:
    name: Tests (root - overlay isolation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with root (overlay isolation tests)
        run: |
          # Run as root to allow overlay mount tests
          # Tests that require root will run; non-root tests still work
          sudo -E env "PATH=$PATH" cargo test
        continue-on-error: true

  # Build and check formatting
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Build release binary
        run: cargo build --release

      - name: Check binary
        run: |
          ./target/release/sketch --version
          ./target/release/sketch --help

  # Security audit
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Code coverage
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --out Xml --timeout 300 --exclude-files tests/**

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
        continue-on-error: true

  # Documentation build check
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --no-deps --document-private-items

      - name: Verify documentation examples
        run: cargo test --doc

  # Summary job
  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [test-non-root, test-root, build, security-audit, coverage, docs]
    if: always()
    steps:
      - name: Non-root tests
        run: |
          if [ "${{ needs.test-non-root.result }}" = "success" ]; then
            echo "✅ Non-root tests passed"
          else
            echo "❌ Non-root tests failed"
            exit 1
          fi

      - name: Root tests
        run: |
          if [ "${{ needs.test-root.result }}" = "success" ]; then
            echo "✅ Root tests passed"
          else
            echo "⚠️  Root tests failed (expected on some systems)"
          fi

      - name: Build check
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Build check passed"
          else
            echo "❌ Build check failed"
            exit 1
          fi

      - name: Security audit
        run: |
          if [ "${{ needs.security-audit.result }}" = "success" ]; then
            echo "✅ Security audit passed"
          else
            echo "⚠️  Security audit failed"
          fi

      - name: Test Summary
        run: |
          echo "## Test Summary"
          echo ""
          echo "| Test | Status |"
          echo "|------|--------|"
          echo "| Non-root tests | ${{ needs.test-non-root.result }} |"
          echo "| Root tests | ${{ needs.test-root.result }} |"
          echo "| Build | ${{ needs.build.result }} |"
          echo "| Security | ${{ needs.security-audit.result }} |"
          echo "| Documentation | ${{ needs.docs.result }} |"
